<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manju's Master Job Board</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0d16;
            --bg-secondary: #111524;
            --bg-card: rgba(17, 21, 37, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-glow: rgba(99, 102, 241, 0.2);
            
            /* Status Colors */
            --color-yes: #10b981;
            --color-yes-bg: rgba(16, 185, 129, 0.1);
            --color-no: #ef4444;
            --color-no-bg: rgba(239, 68, 68, 0.1);
            --color-pending: #f59e0b;
            --color-pending-bg: rgba(245, 158, 11, 0.1);
            --color-error: #a78bfa;
            --color-error-bg: rgba(167, 139, 250, 0.1);
            --color-maybe: #60a5fa;
            --color-maybe-bg: rgba(96, 165, 250, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            padding: 2rem;
        }

        header {
            width: 100%;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 0.625rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.35rem;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .logo-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .file-status-indicator {
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
        }

        .status-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        /* Drag & Drop Zone */
        .upload-zone {
            background: rgba(99, 102, 241, 0.02);
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: 1rem;
            padding: 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }

        .upload-zone:hover {
            background: rgba(99, 102, 241, 0.04);
            border-color: #6366f1;
        }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            color: #6366f1;
        }

        .upload-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .upload-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Table container */
        .table-container {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            overflow-x: auto;
        }

        .table-info-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.25rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            gap: 1.5rem;
        }

        .table-info-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .table-info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.15rem;
        }

        .table-info-value {
            font-weight: 600;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.925rem;
        }

        th, td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background-color: rgba(255, 255, 255, 0.02);
            color: #ffffff;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        th:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.015);
        }

        .filter-row th {
            background-color: transparent !important;
            padding: 0.5rem 0.5rem 1rem 0.5rem;
            cursor: default;
        }

        .filter-row input[type="text"] {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.3s;
            outline: none;
        }

        .filter-row input[type="text"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 8px var(--accent-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Column specific styles */
        .col-id { width: 3.5rem; text-align: center; color: var(--text-secondary); }
        .col-job-id { font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 600; color: #a78bfa; text-align: center; width: 5.5rem; }
        .col-title { font-weight: 600; color: #ffffff; min-width: 12rem; }
        .col-company { min-width: 8rem; }
        .col-location { min-width: 7rem; }
        .col-source { min-width: 7.5rem; }
        .col-posted { min-width: 6.5rem; }
        .col-deadline { min-width: 6.5rem; }
        .col-visited { width: 5.5rem; text-align: center; }
        .col-matches { width: 7.5rem; text-align: center; }
        .col-reason { min-width: 15rem; font-style: italic; color: #d1d5db; font-size: 0.85rem; line-height: 1.45; }
        .col-applied { width: 6.5rem; text-align: center; }
        .col-link { width: 5rem; text-align: center; }

        /* Badges & Actions */
        .status-pill {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.65rem;
            border-radius: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            text-transform: capitalize;
        }

        .status-pill.yes {
            background: var(--color-yes-bg);
            color: var(--color-yes);
        }

        .status-pill.no {
            background: var(--color-no-bg);
            color: var(--color-no);
        }

        .status-pill.pending {
            background: var(--color-pending-bg);
            color: var(--color-pending);
        }

        .status-pill.error {
            background: var(--color-error-bg);
            color: var(--color-error);
        }

        .status-pill.maybe {
            background: var(--color-maybe-bg);
            color: var(--color-maybe);
        }

        .status-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid transparent;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-btn.status-no {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .status-reject {
            background-color: var(--color-no-bg);
            color: var(--color-no);
            border: 1px solid var(--color-no);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        .status-btn.status-no:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .status-btn.status-yes {
            background: var(--color-yes-bg);
            border-color: rgba(16, 185, 129, 0.2);
            color: var(--color-yes);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }

        .status-btn.status-yes:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .apply-btn {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
            transition: all 0.3s;
        }

        .apply-btn:hover {
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        .source-tag {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 0.375rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #d1d5db;
            text-transform: capitalize;
            display: inline-block;
        }

        .desc-btn {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.3s;
            text-align: center;
        }

        .desc-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 0.75rem;
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .spinner {
            width: 2.25rem;
            height: 2.25rem;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            border-top-color: #6366f1;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            body { padding: 1rem; }
            .table-container { padding: 1rem; }
        }

        /* Multi-select Dropdown Styles */
        .filter-row th {
            position: relative;
            overflow: visible;
        }
        
        .ms-btn {
            width: 100%;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            color: var(--text-primary);
            font-size: 0.8rem;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
        }

        .ms-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .ms-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            min-width: 180px;
            max-height: 250px;
            overflow-y: auto;
            background: #1e243b;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            padding: 0.5rem 0;
            text-align: left;
        }

        .ms-dropdown.open {
            display: block;
        }

        .ms-option {
            display: flex;
            align-items: center;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-primary);
            font-weight: normal;
            transition: background 0.2s;
            margin: 0;
            word-break: break-word;
        }

        .ms-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .ms-option input {
            margin-right: 0.5rem;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon">M</div>
            <div class="logo-title">Manju's Master Job Board</div>
        </div>
        <div class="file-status-indicator">
            <div id="file-status-dot" class="status-dot"></div>
            <span id="file-status-text">Connecting...</span>
        </div>
    </header>

    <!-- Fallback drag & drop container -->
    <section class="upload-zone" id="upload-zone">
        <div class="upload-icon">📥</div>
        <h3 class="upload-title">Drop your jobs.json file here</h3>
        <p class="upload-desc">Or click to select it. Drag and drop is required if you are viewing this page directly via file://</p>
        <input type="file" id="file-input" style="display: none;" accept=".json">
    </section>

    <div class="table-container" id="jobs-container">
        <div class="spinner-container">
            <div class="spinner"></div>
            <div>Loading jobs database...</div>
        </div>
    </div>

    <script>
        let allJobs = [];
        let sortAsc = true;
        let lastSortedCol = -1;
        let _rowCache = null; // [{el, vals[]}] — pre-cached cell values for fast filtering

        const fileStatusDot = document.getElementById('file-status-dot');
        const fileStatusText = document.getElementById('file-status-text');
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const jobsContainer = document.getElementById('jobs-container');

        // Initial Data Fetch on load
        window.addEventListener('DOMContentLoaded', () => {
            fetchJobsData();
            setupUploadListeners();
        });

        function fetchJobsData() {
            fetch('jobs.json?nocache=' + new Date().getTime())
                .then(response => {
                    const lastMod = response.headers.get('Last-Modified');
                    return response.json().then(data => ({ data, lastMod }));
                })
                .then(({ data, lastMod }) => {
                    onDataLoaded(data, lastMod, 'Server Connection Active');
                })
                .catch(err => {
                    // CORS fallback loading
                    console.log('Direct XMLHttp/Fetch blocked (likely file:// scheme). Activating drag-and-drop fallback.', err);
                    fileStatusText.textContent = 'Awaiting file upload';
                    uploadZone.style.display = 'block';
                    jobsContainer.innerHTML = `
                        <div class="empty-state">
                            <h3>Awaiting jobs.json</h3>
                            <p>Drag and drop the <strong>jobs.json</strong> file in the designated upload zone above to review your job status.</p>
                        </div>
                    `;
                });
        }

        function setupUploadListeners() {
            uploadZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) processUploadedFile(e.target.files[0]);
            });

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.style.background = 'rgba(99, 102, 241, 0.06)';
            });

            uploadZone.addEventListener('dragleave', () => {
                uploadZone.style.background = 'rgba(99, 102, 241, 0.02)';
            });

            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.style.background = 'rgba(99, 102, 241, 0.02)';
                if (e.dataTransfer.files.length > 0) processUploadedFile(e.dataTransfer.files[0]);
            });
        }

        function processUploadedFile(file) {
            if (!file.name.endsWith('.json')) {
                alert('Please upload a valid JSON file (.json extension).');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    onDataLoaded(data, null, `Loaded: ${file.name}`);
                    uploadZone.style.display = 'none';
                } catch (err) {
                    alert('Error parsing the JSON database file. Verify it contains valid JSON.');
                }
            };
            reader.readAsText(file);
        }

        function onDataLoaded(jobs, lastMod, statusMsg) {
            allJobs = jobs;
            
            // Set Connection indicators
            fileStatusDot.classList.add('connected');
            fileStatusText.textContent = statusMsg;

            if (allJobs.length === 0) {
                jobsContainer.innerHTML = '<div class="empty-state">No jobs found in jobs.json. Please run the scraper first!</div>';
                return;
            }

            buildTable(lastMod);
        }

        function buildTable(lastMod) {
            _rowCache = null; // invalidate cache whenever table is rebuilt
            jobsContainer.innerHTML = '';

            // 1. Info bar
            const infoBar = document.createElement('div');
            infoBar.className = 'table-info-bar';
            
            const dateText = lastMod ? new Date(lastMod).toLocaleString() : new Date().toLocaleString();
            infoBar.innerHTML = `
                <div class="table-info-item" style="align-items: flex-start; margin-right: auto;">
                    <span class="table-info-value" style="font-size: 0.825rem; font-weight: 500; color: var(--text-secondary);">
                        💡 <strong>Tip:</strong> Check multiple options in the column dropdowns to filter. They will be combined (e.g., matching "LinkedIn" OR "Duunitori").
                    </span>
                </div>
                <div class="table-info-item">
                    <span class="table-info-label">Last Updated</span>
                    <span class="table-info-value">${dateText}</span>
                </div>
                <div class="table-info-item">
                    <span class="table-info-label">Total Listings</span>
                    <span class="table-info-value" id="listings-counter">${allJobs.length}</span>
                </div>
            `;
            jobsContainer.appendChild(infoBar);

            // 2. Table structure
            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th class="col-id" onclick="sortTable(0)"># ↕</th>
                        <th class="col-job-id" onclick="sortTable(1)">Job ID ↕</th>
                        <th class="col-title" onclick="sortTable(2)">Job Title ↕</th>
                        <th class="col-company" onclick="sortTable(3)">Company ↕</th>
                        <th class="col-location" onclick="sortTable(4)">Location ↕</th>
                        <th class="col-source" onclick="sortTable(5)">Source ↕</th>
                        <th class="col-posted" onclick="sortTable(6)">Posted ↕</th>
                        <th class="col-deadline" onclick="sortTable(7)">Deadline ↕</th>
                        <th class="col-visited" onclick="sortTable(8)">Visited ↕</th>
                        <th class="col-matches" onclick="sortTable(9)">Matches ↕</th>
                        <th class="col-reason" onclick="sortTable(10)">Reason ↕</th>
                        <th class="col-applied" onclick="sortTable(11)">Applied ↕</th>
                        <th class="col-link">Link</th>
                    </tr>
                    <tr class="filter-row">
                        <th></th>
                        <th><div id="filter-col-1"></div></th>
                        <th><div id="filter-col-2"></div></th>
                        <th><div id="filter-col-3"></div></th>
                        <th><div id="filter-col-4"></div></th>
                        <th><div id="filter-col-5"></div></th>
                        <th><div id="filter-col-6"></div></th>
                        <th><div id="filter-col-7"></div></th>
                        <th><div id="filter-col-8"></div></th>
                        <th><div id="filter-col-9"></div></th>
                        <th><div id="filter-col-10"></div></th>
                        <th><div id="filter-col-11"></div></th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;
            jobsContainer.appendChild(table);

            const tbody = table.querySelector('tbody');
            
            // Helper function to standardize date format
            function formatDate(dateStr) {
                if (!dateStr || dateStr.toLowerCase() === 'n/a' || dateStr.toLowerCase() === 'unknown' || dateStr.toLowerCase() === 'not specified') return 'N/A';
                try {
                    const d = new Date(dateStr);
                    if (isNaN(d.getTime())) {
                        const fiMatch = dateStr.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
                        if (fiMatch) {
                            const fd = new Date(`${fiMatch[3]}-${fiMatch[2].padStart(2, '0')}-${fiMatch[1].padStart(2, '0')}`);
                            if (!isNaN(fd.getTime())) return fd.toISOString().split('T')[0];
                        }
                        return dateStr;
                    }
                    return d.toISOString().split('T')[0];
                } catch(e) {
                    return dateStr;
                }
            }

            // Helper function to extract hostname/source fallback
            function getSourceFromUrl(url) {
                if (!url) return 'Unknown';
                const lUrl = url.toLowerCase();
                if (lUrl.includes('linkedin.com')) return 'linkedin';
                if (lUrl.includes('duunitori.fi')) return 'duunitori';
                if (lUrl.includes('indeed.com')) return 'indeed';
                if (lUrl.includes('oikotie.fi')) return 'oikotie';
                if (lUrl.includes('tyomarkkinatori.fi')) return 'tyomarkkinatori';
                if (lUrl.includes('jobly.fi')) return 'jobly';
                if (lUrl.includes('meetfrank.com')) return 'meetfrank';
                if (lUrl.includes('hub.no')) return 'hub';
                try {
                    const hostname = new URL(url).hostname;
                    return hostname.replace('www.', '');
                } catch(e) {
                    return 'Unknown';
                }
            }

            // 3. Rows
            allJobs.forEach((job, index) => {
                const appliedStatus = localStorage.getItem('applied_' + job.url) || 'no';
                const tr = document.createElement('tr');
                
                const visitedVal = job.visited || 'no';
                const matchVal = job.matches_requirements || 'pending';
                const postedVal = formatDate(job.posted_date);
                const deadlineVal = formatDate(job.deadline);
                const sourceVal = job.source || getSourceFromUrl(job.url) || 'Unknown';
                const jobIdVal = job.id || 'N/A';
                
                tr.innerHTML = `
                    <td class="col-id">${index + 1}</td>
                    <td class="col-job-id">${jobIdVal}</td>
                    <td class="col-title">${job.title || 'Unknown Title'}</td>
                    <td class="col-company">${job.company || 'Unknown Company'}</td>
                    <td class="col-location">📍 ${job.location || 'Unknown Location'}</td>
                    <td class="col-source" data-value="${sourceVal}"><span class="source-tag">${sourceVal}</span></td>
                    <td class="col-posted">${postedVal}</td>
                    <td class="col-deadline">${deadlineVal}</td>
                    <td class="col-visited" data-value="${visitedVal}"><span class="status-pill ${visitedVal}">${visitedVal}</span></td>
                    <td class="col-matches" data-value="${matchVal}"><span class="status-pill ${matchVal}">${matchVal}</span></td>
                    <td class="col-reason"><em>${job.reason || ''}</em></td>
                    <td class="col-applied" data-value="${appliedStatus}">
                        <button class="status-btn ${appliedStatus === 'yes' ? 'status-yes' : (appliedStatus === 'Reject' ? 'status-reject' : 'status-no')}" onclick="toggleApplied(this, '${job.url}')">${appliedStatus}</button>
                    </td>
                    <td class="col-link">
                        <a href="${job.url || '#'}" target="_blank" class="apply-btn" style="margin-bottom: 0.25rem; display: block;">View</a>
                        ${job.description_file ? `<a href="${job.description_file}" target="_blank" class="desc-btn" style="display: block;">Text</a>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            buildMultiSelectFilters();
        }

        function _buildRowCache() {
            const tbody = document.querySelector('table tbody');
            if (!tbody) return;
            const rows = tbody.querySelectorAll('tr');
            _rowCache = Array.from(rows, row => {
                const tds = row.getElementsByTagName('td');
                const vals = Array.from(tds, td =>
                    td.hasAttribute('data-value') ? td.getAttribute('data-value') : td.textContent.trim()
                );
                return { el: row, vals };
            });
        }

        function buildMultiSelectFilters() {
            _buildRowCache();
            const colNames = ['ID', 'Title', 'Company', 'Location', 'Source', 'Posted', 'Deadline', 'Visited', 'Matches', 'Reason', 'Applied'];

            for (let i = 1; i <= 11; i++) {
                const uniqueValues = new Set();
                _rowCache.forEach(({ vals }) => {
                    const val = vals[i];
                    if (val) uniqueValues.add(val);
                });
                
                const sortedVals = Array.from(uniqueValues).sort((a, b) => a.localeCompare(b, undefined, {sensitivity: 'base'}));
                const container = document.getElementById(`filter-col-${i}`);
                if (!container) continue;
                
                let optionsHtml = '';
                sortedVals.forEach(val => {
                    optionsHtml += `<label class="ms-option"><input type="checkbox" value="${val.replace(/"/g, '&quot;')}"> ${val}</label>`;
                });
                
                container.innerHTML = `
                    <div class="ms-container" style="position:relative;">
                        <button class="ms-btn" onclick="toggleDropdown(${i}, event)">Filter... <span>▼</span></button>
                        <div class="ms-dropdown" id="ms-dropdown-${i}">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
                
                const checkboxes = container.querySelectorAll('input[type="checkbox"]');
                checkboxes.forEach(cb => {
                    cb.addEventListener('change', filterTable);
                });
            }
        }
        
        function toggleDropdown(colIndex, event) {
            event.stopPropagation();
            const dropdown = document.getElementById(`ms-dropdown-${colIndex}`);
            const wasOpen = dropdown.classList.contains('open');
            
            document.querySelectorAll('.ms-dropdown').forEach(d => d.classList.remove('open'));
            
            if (!wasOpen && dropdown) {
                dropdown.classList.add('open');
            }
        }
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.ms-container')) {
                document.querySelectorAll('.ms-dropdown').forEach(d => d.classList.remove('open'));
            }
        });

        function sortTable(n) {
            const tbody = document.querySelector('table tbody');
            if (!tbody) return;
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            sortAsc = (lastSortedCol === n) ? !sortAsc : true;
            lastSortedCol = n;
            
            rows.sort((a, b) => {
                let x = a.getElementsByTagName("td")[n];
                let y = b.getElementsByTagName("td")[n];
                
                x = x.hasAttribute("data-value") ? x.getAttribute("data-value") : x.textContent.trim();
                y = y.hasAttribute("data-value") ? y.getAttribute("data-value") : y.textContent.trim();
                
                if (n === 0) return sortAsc ? parseInt(x) - parseInt(y) : parseInt(y) - parseInt(x);
                return sortAsc ? x.localeCompare(y, undefined, {sensitivity: 'base'}) : y.localeCompare(x, undefined, {sensitivity: 'base'});
            });
            
            rows.forEach(row => tbody.appendChild(row));
        }

        // ── History trend chart ────────────────────────────────────────────────
        let _chartHistory = null;
        async function _loadChartHistory() {
            if (_chartHistory !== null) return _chartHistory;
            try {
                const r = await fetch('jobs_history.json?nocache=' + Date.now());
                _chartHistory = r.ok ? await r.json() : [];
            } catch (e) { _chartHistory = []; }
            return _chartHistory;
        }
        function _renderChart(canvas, data, metric) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            ctx.clearRect(0, 0, W, H);
            const _cutoffMs = new Date('2026-06-15T00:00:00').getTime();
            data = (data || []).filter(d => new Date(d.timestamp).getTime() >= _cutoffMs);
            // Downsample: last entry per day for all metrics; max applied count seen that day
            const _byDay = {}, _byDayApplied = {};
            data.forEach(d => {
                const day = d.timestamp.slice(0, 10);
                _byDay[day] = d;
                if (d.applied != null && d.applied > (_byDayApplied[day] ?? 0)) _byDayApplied[day] = d.applied;
            });
            data = Object.keys(_byDay).sort().map(day => ({ ..._byDay[day], applied: _byDayApplied[day] ?? 0 }));
            if (!data || data.length < 2) {
                ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('Not enough data yet', W / 2, H / 2); return;
            }
            const _key0 = metric === 'yes' ? 'yes' : metric === 'applied' ? 'applied' : 'total';
            if (data.every(d => (d[_key0] ?? 0) === 0)) {
                ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('No data yet', W / 2, H / 2); return;
            }
            const LINES = metric === 'yes'
                ? [{ key: 'yes', color: '#10b981', label: 'Yes' }, { key: 'maybe', color: '#f59e0b', label: 'Maybe' }]
                : metric === 'applied'
                ? [{ key: 'applied', color: '#f472b6', label: 'Applied' }]
                : [{ key: 'total', color: '#a5b4fc', label: 'Total' }, { key: 'yes', color: '#10b981', label: 'Yes' }];
            const allVals = data.flatMap(d => LINES.map(l => d[l.key] ?? 0));
            const minVal = Math.max(0, Math.min(...allVals) - 1), maxVal = Math.max(...allVals) + 1, range = maxVal - minVal || 1;
            const pL = 38, pR = 10, pT = 22, pB = 22, cW = W - pL - pR, cH = H - pT - pB;
            ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = pT + cH * i / 4;
                ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(pL + cW, y); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
                ctx.fillText(Math.round(maxVal - range * i / 4), pL - 3, y + 3);
            }
            LINES.forEach(line => {
                ctx.strokeStyle = line.color; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.beginPath();
                data.forEach((d, i) => {
                    const x = pL + (i / (data.length - 1)) * cW;
                    const y = pT + cH - ((d[line.key] ?? 0) - minVal) / range * cH;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }); ctx.stroke();
                if (data.length <= 40) {
                    ctx.fillStyle = line.color;
                    data.forEach((d, i) => {
                        const x = pL + (i / (data.length - 1)) * cW;
                        const y = pT + cH - ((d[line.key] ?? 0) - minVal) / range * cH;
                        ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2); ctx.fill();
                    });
                }
            });
            const fmt = d => new Date(d.timestamp).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '9px sans-serif';
            ctx.textAlign = 'left'; ctx.fillText(fmt(data[0]), pL, H - 5);
            ctx.textAlign = 'right'; ctx.fillText(fmt(data[data.length - 1]), pL + cW, H - 5);
            let lx = pL;
            LINES.forEach(line => {
                ctx.strokeStyle = line.color; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(lx, pT - 7); ctx.lineTo(lx + 14, pT - 7); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.font = '9px sans-serif'; ctx.textAlign = 'left';
                ctx.fillText(line.label, lx + 16, pT - 3);
                lx += 16 + ctx.measureText(line.label).width + 20;
            });
        }
        async function _showChartTooltip(el, metric) {
            const tip = document.getElementById('chart-tooltip');
            document.getElementById('chart-tooltip-title').textContent =
                metric === 'yes' ? 'Yes & Maybe matches over time'
                : metric === 'applied' ? 'Applied jobs over time'
                : 'Total listings & Yes matches over time';
            tip.style.display = 'block';
            const rect = el.getBoundingClientRect();
            const tipW = 350, tipH = 185;
            let left = rect.left + rect.width / 2 - tipW / 2;
            let top = rect.top - tipH - 14 + window.scrollY;
            if (left < 8) left = 8;
            if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
            if (top < window.scrollY + 8) top = rect.bottom + 14 + window.scrollY;
            tip.style.left = left + 'px'; tip.style.top = top + 'px';
            const data = await _loadChartHistory();
            _renderChart(document.getElementById('chart-tooltip-canvas'), data, metric);
        }
        function _hideChartTooltip() { document.getElementById('chart-tooltip').style.display = 'none'; }
        function _attachChartHover(el, metric) {
            if (!el) return;
            el.addEventListener('mouseenter', () => _showChartTooltip(el, metric));
            el.addEventListener('mouseleave', _hideChartTooltip);
        }
        // ── End history trend chart ────────────────────────────────────────────

        function filterTable() {
            if (!_rowCache) _buildRowCache();

            // Collect active filters (pure JS, no DOM reads in hot loop)
            const filters = {};
            for (let i = 1; i <= 11; i++) {
                const container = document.getElementById(`filter-col-${i}`);
                if (!container) continue;
                const checked = Array.from(container.querySelectorAll('input[type="checkbox"]:checked'), cb => cb.value);
                if (checked.length) filters[i] = new Set(checked);
            }
            const filterEntries = Object.entries(filters);

            let visibleCount = 0;
            let counts = { yes: 0, no: 0, maybe: 0, pending: 0 };
            let appliedCount = 0;
            const n = _rowCache.length;
            const displayBits = new Uint8Array(n); // 0=hide, 1=show

            for (let r = 0; r < n; r++) {
                const { vals } = _rowCache[r];
                let show = true;
                for (let f = 0; f < filterEntries.length; f++) {
                    const [col, allowed] = filterEntries[f];
                    if (!allowed.has(vals[+col] || '')) { show = false; break; }
                }
                if (show) {
                    displayBits[r] = 1;
                    visibleCount++;
                    const mv = vals[9];
                    if (mv === 'yes') counts.yes++;
                    else if (mv === 'no') counts.no++;
                    else if (mv === 'maybe') counts.maybe++;
                    else if (mv === 'pending') counts.pending++;
                    if (vals[11] === 'yes') appliedCount++;
                }
            }

            // Batch all DOM writes in one rAF to avoid repeated reflow
            requestAnimationFrame(() => {
                for (let r = 0; r < n; r++) {
                    _rowCache[r].el.style.display = displayBits[r] ? '' : 'none';
                }
            });
            const counter = document.getElementById('listings-counter');
            if (counter) {
                let text = `<strong>${visibleCount}</strong>`;
                if (visibleCount !== allJobs.length)
                    text += ` (filtered from <span id="stat-total" style="cursor:help; border-bottom:1px dashed rgba(255,255,255,0.4);">${allJobs.length}</span>)`;
                else
                    text += ` (<span id="stat-total" style="cursor:help; border-bottom:1px dashed rgba(255,255,255,0.4);">total: ${allJobs.length}</span>)`;
                text += `&nbsp; <span style="opacity:0.3;">|</span> &nbsp;`;
                text += `<span id="stat-yes" style="color:var(--color-yes);font-weight:600;cursor:help;border-bottom:1px dashed rgba(16,185,129,0.5);">Yes: ${counts.yes}</span>&nbsp;&nbsp; `;
                text += `<span style="color:var(--color-maybe);font-weight:600;">Maybe: ${counts.maybe}</span>&nbsp;&nbsp; `;
                text += `<span style="color:var(--color-no);font-weight:600;">No: ${counts.no}</span>&nbsp;&nbsp; `;
                text += `<span style="color:var(--color-pending);font-weight:600;">Pending: ${counts.pending}</span>`;
                if (appliedCount > 0)
                    text += `&nbsp;&nbsp; <span style="opacity:0.3;">|</span> &nbsp;<span id="stat-applied" style="color:#f472b6;font-weight:600;cursor:help;border-bottom:1px dashed rgba(244,114,182,0.5);">Applied: ${appliedCount}</span>`;
                counter.innerHTML = text;
                _attachChartHover(document.getElementById('stat-yes'), 'yes');
                _attachChartHover(document.getElementById('stat-total'), 'total');
                _attachChartHover(document.getElementById('stat-applied'), 'applied');
            }
        }

        async function toggleApplied(btn, url) {
            const current = btn.textContent.trim();
            let newState;
            if (current === 'no') newState = 'yes';
            else if (current === 'yes') newState = 'Reject';
            else newState = 'no';
            
            if (newState === 'Reject') {
                const reason = prompt("Why are you rejecting this job? (This will update the AI's requirements. Max 100 words)");
                if (reason === null) return; // cancelled
                if (reason.split(' ').length > 100) {
                    alert("Reason must be less than 100 words.");
                    return;
                }
                if (reason.trim() === '') {
                    alert("Reason cannot be empty.");
                    return;
                }
                
                // Save to Firestore
                if (window.firebaseDb) {
                    try {
                        btn.textContent = 'Saving...';
                        btn.disabled = true;
                        await window.addDoc(window.collection(window.firebaseDb, "rejected_jobs"), {
                            url: url,
                            reason: reason,
                            status: "unread",
                            timestamp: window.serverTimestamp()
                        });
                        alert("Rejection reason saved! The scraper will automatically update its requirements shortly.");
                        btn.disabled = false;
                    } catch (e) {
                        console.error(e);
                        alert("Failed to save to cloud database. Has Firestore been initialized?");
                        btn.textContent = current;
                        btn.disabled = false;
                        return;
                    }
                } else {
                    alert("Firebase not initialized yet.");
                    return;
                }
            }

            localStorage.setItem('applied_' + url, newState);
            btn.textContent = newState;
            
            btn.className = 'status-btn';
            if (newState === 'yes') btn.classList.add('status-yes');
            else if (newState === 'no') btn.classList.add('status-no');
            else btn.classList.add('status-reject');
            
            const td = btn.closest('td');
            td.setAttribute('data-value', newState);
        }
    </script>

        <div id="chart-tooltip-title" style="font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.55);margin-bottom:0.5rem;font-family:'Space Grotesk',sans-serif;letter-spacing:0.04em;text-transform:uppercase;"></div>
        <canvas id="chart-tooltip-canvas" width="318" height="130"></canvas>
    </div>
