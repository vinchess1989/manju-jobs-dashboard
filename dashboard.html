<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manju's Master Job Board</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0d16;
            --bg-secondary: #111524;
            --bg-card: rgba(17, 21, 37, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-glow: rgba(99, 102, 241, 0.2);
            
            /* Status Colors */
            --color-yes: #10b981;
            --color-yes-bg: rgba(16, 185, 129, 0.1);
            --color-no: #ef4444;
            --color-no-bg: rgba(239, 68, 68, 0.1);
            --color-pending: #f59e0b;
            --color-pending-bg: rgba(245, 158, 11, 0.1);
            --color-error: #a78bfa;
            --color-error-bg: rgba(167, 139, 250, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            padding: 2rem;
        }

        header {
            width: 100%;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 0.625rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.35rem;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .logo-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .file-status-indicator {
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
        }

        .status-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        /* Drag & Drop Zone */
        .upload-zone {
            background: rgba(99, 102, 241, 0.02);
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: 1rem;
            padding: 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }

        .upload-zone:hover {
            background: rgba(99, 102, 241, 0.04);
            border-color: #6366f1;
        }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            color: #6366f1;
        }

        .upload-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .upload-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Table container */
        .table-container {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            overflow-x: auto;
        }

        .table-info-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.25rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            gap: 1.5rem;
        }

        .table-info-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .table-info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.15rem;
        }

        .table-info-value {
            font-weight: 600;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.925rem;
        }

        th, td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background-color: rgba(255, 255, 255, 0.02);
            color: #ffffff;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        th:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.015);
        }

        .filter-row th {
            background-color: transparent !important;
            padding: 0.5rem 0.5rem 1rem 0.5rem;
            cursor: default;
        }

        .filter-row input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.3s;
            outline: none;
        }

        .filter-row input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 8px var(--accent-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Column specific styles */
        .col-id { width: 3.5rem; text-align: center; color: var(--text-secondary); }
        .col-title { font-weight: 600; color: #ffffff; min-width: 12rem; }
        .col-company { min-width: 8rem; }
        .col-location { min-width: 7rem; }
        .col-posted { min-width: 6.5rem; }
        .col-deadline { min-width: 6.5rem; }
        .col-visited { width: 5.5rem; text-align: center; }
        .col-matches { width: 7.5rem; text-align: center; }
        .col-reason { min-width: 15rem; font-style: italic; color: #d1d5db; font-size: 0.85rem; line-height: 1.45; }
        .col-applied { width: 6.5rem; text-align: center; }
        .col-link { width: 5rem; text-align: center; }

        /* Badges & Actions */
        .status-pill {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.65rem;
            border-radius: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            text-transform: capitalize;
        }

        .status-pill.yes {
            background: var(--color-yes-bg);
            color: var(--color-yes);
        }

        .status-pill.no {
            background: var(--color-no-bg);
            color: var(--color-no);
        }

        .status-pill.pending {
            background: var(--color-pending-bg);
            color: var(--color-pending);
        }

        .status-pill.error {
            background: var(--color-error-bg);
            color: var(--color-error);
        }

        .status-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid transparent;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-btn.status-no {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-color);
            color: var(--text-secondary);
        }

        .status-btn.status-no:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .status-btn.status-yes {
            background: var(--color-yes-bg);
            border-color: rgba(16, 185, 129, 0.2);
            color: var(--color-yes);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }

        .status-btn.status-yes:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .apply-btn {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
            transition: all 0.3s;
        }

        .apply-btn:hover {
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        .desc-btn {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.3s;
            text-align: center;
        }

        .desc-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 0.75rem;
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .spinner {
            width: 2.25rem;
            height: 2.25rem;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            border-top-color: #6366f1;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            body { padding: 1rem; }
            .table-container { padding: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon">M</div>
            <div class="logo-title">Manju's Master Job Board</div>
        </div>
        <div class="file-status-indicator">
            <div id="file-status-dot" class="status-dot"></div>
            <span id="file-status-text">Connecting...</span>
        </div>
    </header>

    <!-- Fallback drag & drop container -->
    <section class="upload-zone" id="upload-zone">
        <div class="upload-icon">📥</div>
        <h3 class="upload-title">Drop your jobs.json file here</h3>
        <p class="upload-desc">Or click to select it. Drag and drop is required if you are viewing this page directly via file://</p>
        <input type="file" id="file-input" style="display: none;" accept=".json">
    </section>

    <div class="table-container" id="jobs-container">
        <div class="spinner-container">
            <div class="spinner"></div>
            <div>Loading jobs database...</div>
        </div>
    </div>

    <script>
        let allJobs = [];
        let sortAsc = true;
        let lastSortedCol = -1;

        const fileStatusDot = document.getElementById('file-status-dot');
        const fileStatusText = document.getElementById('file-status-text');
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const jobsContainer = document.getElementById('jobs-container');

        // Initial Data Fetch on load
        window.addEventListener('DOMContentLoaded', () => {
            fetchJobsData();
            setupUploadListeners();
        });

        function fetchJobsData() {
            fetch('jobs.json?nocache=' + new Date().getTime())
                .then(response => {
                    const lastMod = response.headers.get('Last-Modified');
                    return response.json().then(data => ({ data, lastMod }));
                })
                .then(({ data, lastMod }) => {
                    onDataLoaded(data, lastMod, 'Server Connection Active');
                })
                .catch(err => {
                    // CORS fallback loading
                    console.log('Direct XMLHttp/Fetch blocked (likely file:// scheme). Activating drag-and-drop fallback.', err);
                    fileStatusText.textContent = 'Awaiting file upload';
                    uploadZone.style.display = 'block';
                    jobsContainer.innerHTML = `
                        <div class="empty-state">
                            <h3>Awaiting jobs.json</h3>
                            <p>Drag and drop the <strong>jobs.json</strong> file in the designated upload zone above to review your job status.</p>
                        </div>
                    `;
                });
        }

        function setupUploadListeners() {
            uploadZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) processUploadedFile(e.target.files[0]);
            });

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.style.background = 'rgba(99, 102, 241, 0.06)';
            });

            uploadZone.addEventListener('dragleave', () => {
                uploadZone.style.background = 'rgba(99, 102, 241, 0.02)';
            });

            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.style.background = 'rgba(99, 102, 241, 0.02)';
                if (e.dataTransfer.files.length > 0) processUploadedFile(e.dataTransfer.files[0]);
            });
        }

        function processUploadedFile(file) {
            if (!file.name.endsWith('.json')) {
                alert('Please upload a valid JSON file (.json extension).');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    onDataLoaded(data, null, `Loaded: ${file.name}`);
                    uploadZone.style.display = 'none';
                } catch (err) {
                    alert('Error parsing the JSON database file. Verify it contains valid JSON.');
                }
            };
            reader.readAsText(file);
        }

        function onDataLoaded(jobs, lastMod, statusMsg) {
            allJobs = jobs;
            
            // Set Connection indicators
            fileStatusDot.classList.add('connected');
            fileStatusText.textContent = statusMsg;

            if (allJobs.length === 0) {
                jobsContainer.innerHTML = '<div class="empty-state">No jobs found in jobs.json. Please run the scraper first!</div>';
                return;
            }

            buildTable(lastMod);
        }

        function buildTable(lastMod) {
            jobsContainer.innerHTML = '';

            // 1. Info bar
            const infoBar = document.createElement('div');
            infoBar.className = 'table-info-bar';
            
            const dateText = lastMod ? new Date(lastMod).toLocaleString() : new Date().toLocaleString();
            infoBar.innerHTML = `
                <div class="table-info-item">
                    <span class="table-info-label">Last Updated</span>
                    <span class="table-info-value">${dateText}</span>
                </div>
                <div class="table-info-item">
                    <span class="table-info-label">Total Listings</span>
                    <span class="table-info-value">${allJobs.length}</span>
                </div>
            `;
            jobsContainer.appendChild(infoBar);

            // 2. Table structure
            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th class="col-id" onclick="sortTable(0)"># ↕</th>
                        <th class="col-title" onclick="sortTable(1)">Job Title ↕</th>
                        <th class="col-company" onclick="sortTable(2)">Company ↕</th>
                        <th class="col-location" onclick="sortTable(3)">Location ↕</th>
                        <th class="col-posted" onclick="sortTable(4)">Posted ↕</th>
                        <th class="col-deadline" onclick="sortTable(5)">Deadline ↕</th>
                        <th class="col-visited" onclick="sortTable(6)">Visited ↕</th>
                        <th class="col-matches" onclick="sortTable(7)">Matches ↕</th>
                        <th class="col-reason" onclick="sortTable(8)">Reason ↕</th>
                        <th class="col-applied" onclick="sortTable(9)">Applied ↕</th>
                        <th class="col-link">Link</th>
                    </tr>
                    <tr class="filter-row">
                        <th></th>
                        <th><input type="text" oninput="filterTable()" placeholder="Filter title..."></th>
                        <th><input type="text" oninput="filterTable()" placeholder="Filter company..."></th>
                        <th><input type="text" oninput="filterTable()" placeholder="Filter location..."></th>
                        <th><input type="text" oninput="filterTable()" placeholder="Filter posted..."></th>
                        <th><input type="text" oninput="filterTable()" placeholder="Filter deadline..."></th>
                        <th><input type="text" oninput="filterTable()" placeholder="Filter visited..."></th>
                        <th><input type="text" oninput="filterTable()" placeholder="Filter matches..."></th>
                        <th><input type="text" oninput="filterTable()" placeholder="Filter reason..."></th>
                        <th><input type="text" oninput="filterTable()" placeholder="Filter applied..."></th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;
            jobsContainer.appendChild(table);

            const tbody = table.querySelector('tbody');
            
            // 3. Rows
            allJobs.forEach((job, index) => {
                const appliedStatus = localStorage.getItem('applied_' + job.url) || 'no';
                const tr = document.createElement('tr');
                
                const visitedVal = job.visited || 'no';
                const matchVal = job.matches_requirements || 'pending';
                const postedVal = job.posted_date || 'N/A';
                const deadlineVal = job.deadline || 'N/A';
                
                tr.innerHTML = `
                    <td class="col-id">${index + 1}</td>
                    <td class="col-title">${job.title || 'Unknown Title'}</td>
                    <td class="col-company">${job.company || 'Unknown Company'}</td>
                    <td class="col-location">📍 ${job.location || 'Unknown Location'}</td>
                    <td class="col-posted">${postedVal}</td>
                    <td class="col-deadline">${deadlineVal}</td>
                    <td class="col-visited"><span class="status-pill ${visitedVal}">${visitedVal}</span></td>
                    <td class="col-matches"><span class="status-pill ${matchVal}">${matchVal}</span></td>
                    <td class="col-reason"><em>${job.reason || ''}</em></td>
                    <td class="col-applied" data-value="${appliedStatus}">
                        <button class="status-btn ${appliedStatus === 'yes' ? 'status-yes' : 'status-no'}" onclick="toggleApplied(this, '${job.url}')">${appliedStatus}</button>
                    </td>
                    <td class="col-link">
                        <a href="${job.url || '#'}" target="_blank" class="apply-btn" style="margin-bottom: 0.25rem; display: block;">View</a>
                        ${job.description_file ? `<a href="${job.description_file}" target="_blank" class="desc-btn" style="display: block;">Text</a>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function sortTable(n) {
            const tbody = document.querySelector('table tbody');
            if (!tbody) return;
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            sortAsc = (lastSortedCol === n) ? !sortAsc : true;
            lastSortedCol = n;
            
            rows.sort((a, b) => {
                let x = a.getElementsByTagName("td")[n];
                let y = b.getElementsByTagName("td")[n];
                
                x = x.hasAttribute("data-value") ? x.getAttribute("data-value") : x.textContent.trim();
                y = y.hasAttribute("data-value") ? y.getAttribute("data-value") : y.textContent.trim();
                
                if (n === 0) return sortAsc ? parseInt(x) - parseInt(y) : parseInt(y) - parseInt(x);
                return sortAsc ? x.localeCompare(y, undefined, {sensitivity: 'base'}) : y.localeCompare(x, undefined, {sensitivity: 'base'});
            });
            
            rows.forEach(row => tbody.appendChild(row));
        }

        function filterTable() {
            const inputs = document.querySelectorAll('.filter-row input');
            const rows = document.querySelectorAll('tbody tr');
            
            rows.forEach(row => {
                let show = true;
                inputs.forEach((input, index) => {
                    const filter = input.value.toLowerCase().trim();
                    if (filter) {
                        // Offset by 1 because ID (#) column does not have an input
                        const td = row.getElementsByTagName("td")[index + 1];
                        const val = td && td.hasAttribute("data-value") ? td.getAttribute("data-value").toLowerCase() : (td ? td.textContent.toLowerCase() : "");
                        
                        if (val.indexOf(filter) === -1) {
                            show = false;
                        }
                    }
                });
                row.style.display = show ? "" : "none";
            });
        }

        function toggleApplied(btn, jobUrl) {
            const currentStatus = btn.textContent.trim();
            const newStatus = currentStatus === 'no' ? 'yes' : 'no';
            
            btn.textContent = newStatus;
            btn.className = 'status-btn ' + (newStatus === 'yes' ? 'status-yes' : 'status-no');
            btn.parentElement.setAttribute('data-value', newStatus);
            
            localStorage.setItem('applied_' + jobUrl, newStatus);
        }
    </script>
</body>
</html>
